  flutter_shakemywidget: ^1.0.5+1
  # flutter_osm_plugin: ^1.3.6
  flutter_timezone: ^5.0.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  uuid: 4.5.2
