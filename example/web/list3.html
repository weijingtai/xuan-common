<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古籍长卷UI</title>
    <style>
        /* 导入一个中文字体感较强的堆栈 */
        body {
            background-color: #dcd3b6;
            /* 这种颜色更像陈年老纸 */
            background-image: radial-gradient(#e5dec7 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* 模拟长卷容器 */
        .scroll-container {
            width: 100%;
            max-width: 450px;
            background: #f4f1e1;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
            border-left: 15px solid #8b4513;
            /* 模拟卷轴的木杆边 */
            position: relative;
            padding-bottom: 50px;
        }

        /* 装饰用的卷轴顶部 */
        .scroll-top {
            height: 40px;
            background: linear-gradient(to right, #5d2e0a, #8b4513, #5d2e0a);
            border-radius: 5px 5px 0 0;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.3);
        }

        .list-tile {
            position: relative;
            padding: 30px 20px;
            border-bottom: 1px dashed #c0a46d;
            display: grid;
            grid-template-columns: 80px 1fr 60px;
            align-items: center;
        }

        /* 移除最后一个元素的下划线 */
        .list-tile:last-child {
            border-bottom: none;
        }

        /* 左侧：木刻印章感 */
        .pillar-box {
            text-align: center;
            border: 2px solid #a61b1b;
            padding: 5px;
            background: rgba(166, 27, 27, 0.05);
            width: 50px;
            height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        /* 装饰角花 */
        .pillar-box::before {
            content: "◆";
            position: absolute;
            top: -8px;
            left: -8px;
            color: #a61b1b;
            font-size: 10px;
        }

        .ganzhi-text {
            font-size: 28px;
            font-family: "Kaiti", "楷体", serif;
            font-weight: bold;
            color: #1a1a1a;
            writing-mode: vertical-rl;
            letter-spacing: 5px;
        }

        /* 中间：水墨书法感 */
        .content-main {
            padding-left: 15px;
            border-left: 1px solid #e0d0b0;
        }

        .ten-god-title {
            font-family: "Kaiti", "楷体", serif;
            font-size: 22px;
            color: #a61b1b;
            margin-bottom: 8px;
            display: block;
        }

        .detail-row {
            display: flex;
            gap: 10px;
            font-size: 14px;
            color: #554a33;
        }

        .detail-item b {
            color: #8b4513;
            margin-right: 2px;
        }

        /* 右侧：年份（竖排小字，仿批注） */
        .year-sidebar {
            font-size: 13px;
            color: #7a6e5a;
            writing-mode: vertical-rl;
            text-align: left;
            border-left: 1px solid #dcd3b6;
            padding-left: 8px;
            height: 100%;
        }

        /* 当前大运的高亮：朱砂印章 */
        .current-badge {
            position: absolute;
            right: 15px;
            top: 10px;
            width: 35px;
            height: 35px;
            border: 2px solid #a61b1b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a61b1b;
            font-size: 10px;
            font-weight: bold;
            transform: rotate(-15deg);
            opacity: 0.8;
            background: rgba(166, 27, 27, 0.05);
        }

        /* 装饰云纹 */
        .cloud-pattern {
            width: 100%;
            height: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="20" viewBox="0 0 40 20"><path d="M0 15 Q10 5 20 15 T40 15" fill="none" stroke="%23c0a46d" stroke-width="1"/></svg>');
            opacity: 0.3;
        }
    </style>
</head>

<body>

    <div class="scroll-container">
        <div class="scroll-top"></div>

        <div class="list-tile">
            <div class="current-badge">现行</div>
            <div class="pillar-box">
                <div class="ganzhi-text">甲辰</div>
            </div>
            <div class="content-main">
                <span class="ten-god-title">正财大运</span>
                <div class="detail-row">
                    <span class="detail-item"><b>戊</b>正财</span>
                    <span class="detail-item"><b>乙</b>正官</span>
                    <span class="detail-item"><b>癸</b>正印</span>
                </div>
                <div style="margin-top: 10px; font-size: 12px; color: #998c75;">
                    此运财官相生，诸事顺遂
                </div>
            </div>
            <div class="year-sidebar">
                二〇二四 — 二〇三三
                <br>
                廿八岁至卅八岁
            </div>
        </div>

        <div class="cloud-pattern"></div>

        <div class="list-tile">
            <div class="pillar-box">
                <div class="ganzhi-text">甲寅</div>
            </div>
            <div class="content-main">
                <span class="ten-god-title">偏财大运</span>
                <div class="detail-row">
                    <span class="detail-item"><b>甲</b>偏财</span>
                    <span class="detail-item"><b>丙</b>食神</span>
                    <span class="detail-item"><b>戊</b>七杀</span>
                </div>
            </div>
            <div class="year-sidebar">
                二〇三四 — 二〇四三
                <br>
                卅八岁至四八岁
            </div>
        </div>

        <div class="cloud-pattern"></div>

        <div class="list-tile">
            <div class="pillar-box">
                <div class="ganzhi-text">甲子</div>
            </div>
            <div class="content-main">
                <span class="ten-god-title">正印大运</span>
                <div class="detail-row">
                    <span class="detail-item"><b>癸</b>正印</span>
                </div>
            </div>
            <div class="year-sidebar">
                二〇四四 — 二〇五三
                <br>
                四八岁至五八岁
            </div>
        </div>

    </div>

</body>

</html>
