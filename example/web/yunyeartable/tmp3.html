<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>经纬通鉴 - 高密度水墨排版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --primary-cinnabar: #B22D2A; /* 朱砂红 */
            --ink-black: #2D2D2D;        /* 焦墨 */
            --ink-grey: #7A7A7A;         /* 烟墨 */
            --paper-bg: #F7F4EF;         /* 宣纸色 */
            --border-line: #D1CDC2;      /* 乌丝栏线 */
        }
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #E8E4D9;
            color: var(--ink-black);
        }
        .paper-texture {
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            background-color: var(--paper-bg);
        }
        /* 竖排书法文字 */
        .writing-v {
            writing-mode: vertical-lr;
            text-orientation: upright;
        }
        /* 隐藏滚动条 */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 细微水墨晕染动画 */
        .ink-hover:hover {
            background-color: rgba(178, 45, 42, 0.03);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-[1600px] mx-auto space-y-8">

    <header class="flex gap-3 overflow-x-auto pb-4 scrollbar-hide">
        <button class="flex-shrink-0 px-5 py-2 border border-[--primary-cinnabar] bg-[--primary-cinnabar] text-white shadow-md relative">
            <span class="text-sm font-bold">甲辰大运</span>
            <div class="absolute inset-0 border border-white/20 m-0.5"></div>
        </button>
        <button class="flex-shrink-0 px-5 py-2 border border-[--border-line] text-[--ink-grey] hover:text-[--primary-cinnabar] transition-colors">
            <span class="text-sm">乙巳大运</span>
        </button>
        <button class="flex-shrink-0 px-5 py-2 border border-[--border-line] text-[--ink-grey] hover:text-[--primary-cinnabar] transition-colors">
            <span class="text-sm">丙午大运</span>
        </button>
        </header>

    <main class="paper-texture shadow-2xl border border-[--border-line] rounded-sm overflow-hidden">
        
        <div class="overflow-x-auto scrollbar-hide">
            <table class="w-full border-collapse table-fixed min-w-[1200px]">
                <thead>
                    <tr class="bg-[#F2EFE5]/50">
                        <th class="w-16 border-r border-b border-[--border-line] py-3 text-xs text-[--ink-grey] font-normal">气运</th>
                        <script>
                            for(let i=2024; i<=2033; i++) {
                                document.write(`
                                    <th class="border-r border-b border-[--border-line] p-2 bg-[#F2EFE5]/30">
                                        <div class="flex flex-col items-center">
                                            <span class="text-[10px] text-[--ink-grey] font-serif">${i}</span>
                                            <div class="flex items-center gap-1 mt-1">
                                                <span class="text-lg font-bold text-[--ink-black]">甲辰</span>
                                                <span class="text-[10px] bg-[--primary-cinnabar]/10 text-[--primary-cinnabar] px-0.5 rounded-sm">比肩</span>
                                            </div>
                                            <span class="text-[9px] text-[--ink-grey] mt-1 tracking-widest">属龙 · Dragon</span>
                                        </div>
                                    </th>
                                `);
                            }
                        </script>
                    </tr>
                </thead>
                <tbody>
                    <script>
                        const months = ["正月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "冬月", "腊月"];
                        months.forEach((m, idx) => {
                            document.write(`
                                <tr class="ink-hover group">
                                    <td class="border-r border-b border-[--border-line] text-center bg-[#F2EFE5]/20">
                                        <span class="writing-v text-xs text-[--ink-grey] py-2 font-medium">${m}</span>
                                    </td>
                                    ${new Array(10).fill(0).map(() => `
                                        <td class="border-r border-b border-[--border-line] p-1.5 h-32 relative group/cell overflow-hidden">
                                            <div class="flex h-full gap-2">
                                                <div class="w-2/5 flex flex-col items-center justify-center border-r border-[--border-line]/20">
                                                    <span class="writing-v text-lg font-bold text-[--ink-black] tracking-tighter">壬申</span>
                                                </div>
                                                
                                                <div class="flex-1 flex flex-col justify-between py-1">
                                                    <div class="flex flex-col">
                                                        <span class="text-[11px] font-bold text-[--primary-cinnabar] leading-none">偏印</span>
                                                        <span class="text-[8px] text-[--ink-grey] opacity-40 scale-75 origin-left mt-0.5">天干</span>
                                                    </div>

                                                    <div class="border-t border-dashed border-[--border-line]/40 my-1"></div>

                                                    <div class="space-y-1.5">
                                                        <div class="flex items-center justify-between pr-1">
                                                            <span class="text-[10px] font-bold text-[--primary-cinnabar] leading-none">偏印</span>
                                                            <span class="text-[8px] text-[--ink-grey] scale-90">庚</span>
                                                        </div>
                                                        <div class="flex items-center justify-between pr-1">
                                                            <span class="text-[10px] font-bold text-[--primary-cinnabar] leading-none">比肩</span>
                                                            <span class="text-[8px] text-[--ink-grey] scale-90">壬</span>
                                                        </div>
                                                        <div class="flex items-center justify-between pr-1">
                                                            <span class="text-[10px] font-bold text-[--primary-cinnabar] leading-none">七杀</span>
                                                            <span class="text-[8px] text-[--ink-grey] scale-90">戊</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="absolute -bottom-1 -left-1 text-3xl font-bold text-[--ink-black] opacity-[0.03] select-none pointer-events-none">龍</div>
                                        </td>
                                    `).join('')}
                                </tr>
                            `);
                        });
                    </script>
                </tbody>
            </table>
        </div>
    </main>

    <footer class="flex flex-col md:flex-row gap-6 items-end">
        <div class="flex-1 w-full paper-texture p-4 border border-[--border-line] shadow-sm relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 h-full bg-[--primary-cinnabar]"></div>
            <div class="flex justify-between items-end mb-2">
                <span class="text-xs font-bold text-[--primary-cinnabar]">时空进度：丙午年 (2026)</span>
                <span class="text-[10px] text-[--ink-grey]">距下一大运：2841天</span>
            </div>
            <div class="h-1.5 bg-[--border-line]/30 w-full relative">
                <div class="absolute h-full bg-[--primary-cinnabar] w-1/4"></div>
                <div class="absolute left-1/4 -top-1 w-3 h-3 bg-white border-2 border-[--primary-cinnabar] rounded-full shadow-sm"></div>
            </div>
        </div>

        <div class="w-full md:w-80 grid grid-cols-7 gap-1">
            <script>
                for(let d=1; d<=7; d++) {
                    document.write(`
                        <div class="aspect-square border border-[--border-line] paper-texture flex flex-col items-center justify-center ink-hover cursor-pointer">
                            <span class="text-[10px] text-[--ink-grey]">${d}</span>
                            <span class="text-xs font-bold">甲子</span>
                            <div class="w-1 h-1 bg-[--primary-cinnabar] mt-0.5 opacity-50"></div>
                        </div>
                    `);
                }
            </script>
        </div>
    </footer>

</div>

</body>
</html>
