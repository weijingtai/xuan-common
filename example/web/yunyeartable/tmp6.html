<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet"/>
    <style>
        .paper-bg {
            background-image: url('https://www.transparenttextures.com/patterns/rice-paper.png');
            background-color: #F7F4EF;
        }
        .font-calligraphy { font-family: 'Ma Shan Zheng', cursive; }
        .font-serif-bold { font-family: 'Noto Serif SC', serif; font-weight: 700; }
        /* 统一字体大小与比重控制 */
        .data-text-sync {
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
        }
    </style>
</head>
<body class="p-10 bg-gray-200">

    <div class="relative w-[100px] h-[120px] rounded-lg overflow-hidden shadow-xl border border-[#D1CDC2] paper-bg flex flex-col">
        
        <header class="bg-[#1A1A1A] py-0.5 flex flex-col items-center justify-center leading-none z-20">
            <span class="text-[#F7F4EF] text-[10px] font-bold">2024</span>
            <span class="text-[#D4AF37] text-[8px] opacity-90 scale-90">廿八岁</span>
        </header>

        <main class="flex-1 flex p-1 relative">
            
            <div class="absolute -bottom-3 -left-4 text-6xl font-bold text-[#2D2D2D] opacity-[0.12] rotate-[-15deg] select-none pointer-events-none font-calligraphy">
                龍
            </div>

            <div class="w-[35%] flex flex-col items-center justify-center z-10">
                <div class="font-calligraphy text-[26px] text-[#2D2D2D] leading-none tracking-tighter">
                    甲<br/>辰
                </div>
            </div>

            <div class="w-[1px] bg-[#B22D2A] my-1 opacity-50"></div>

            <div class="flex-1 flex flex-col justify-between pl-2 py-1 z-10">
                
                <div class="flex items-center gap-1">
                    <span class="data-text-sync text-[#2D2D2D]">甲</span>
                    <span class="data-text-sync text-[#B22D2A]">正财</span>
                </div>

                <div class="flex flex-col gap-1.5 mt-1">
                    <div class="flex items-center gap-1">
                        <span class="data-text-sync text-[#2D2D2D]">乙</span>
                        <span class="data-text-sync text-[#B22D2A]">劫财</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="data-text-sync text-[#2D2D2D]">癸</span>
                        <span class="data-text-sync text-[#B22D2A]">正印</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="data-text-sync text-[#2D2D2D]">戊</span>
                        <span class="data-text-sync text-[#B22D2A]">偏财</span>
                    </div>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
