<br/>

</div>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>黑金宣纸经纬卡片</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .paper-texture {
            background-image: url('https://www.transparenttextures.com/patterns/rice-paper.png');
            background-color: #F7F4EF;
        }
        /* 竖排书法字体 */
        .font-calligraphy {
            font-family: 'Ma Shan Zheng', cursive;
        }
        /* 朱丝栏分隔线 */
        .zhu-si-lan {
            border-left: 1px solid #B22D2A;
        }
    </style>
</head>
<body>

    <div class="w-64 rounded-xl overflow-hidden shadow-2xl border border-[#D1CDC2]">
        
        <header class="bg-[#1A1A1A] py-3 text-center relative">
            <h1 class="text-[#F7F4EF] text-2xl font-bold tracking-widest">2024</h1>
            <p class="text-[#D4AF37] text-sm mt-1 opacity-90">廿八岁</p>
            <div class="absolute top-2 right-2 text-[#B22D2A] text-xs bg-[#F7F4EF]/10 px-1.5 py-0.5 rounded-sm">
                立春
            </div>
        </header>

        <main class="paper-texture p-5 flex">
            
            <div class="flex-1 flex justify-center items-center pr-4">
                <div class="font-calligraphy text-6xl text-[#2D2D2D] leading-none flex flex-col items-center">
                    <span>甲</span>
                    <span class="mt-1">辰</span>
                </div>
            </div>

            <div class="zhu-si-lan"></div>

            <div class="flex-1 pl-4 flex flex-col justify-between py-1">
                
                <div class="flex items-center gap-1.5 mb-3">
                    <div class="w-4 h-4 bg-[#B22D2A] text-[#F7F4EF] text-[10px] flex items-center justify-center rounded-sm">
                        干
                    </div>
                    <span class="text-lg font-bold text-[#B22D2A]">正财</span>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center text-sm">
                        <span class="font-bold text-[#2D2D2D]">乙</span>
                        <span class="text-[#B22D2A]">劫财</span>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span class="font-bold text-[#2D2D2D]">癸</span>
                        <span class="text-[#B22D2A]">正印</span>
                    </div>
                    <div class="flex justify-between items-center text-sm">
                        <span class="font-bold text-[#2D2D2D]">戊</span>
                        <span class="text-[#B22D2A]">偏财</span>
                    </div>
                </div>

            </div>
        </main>

        <footer class="bg-[#E8E4D9] py-2 text-center border-t border-[#D1CDC2]/50">
            <p class="text-sm text-[#7A7A7A] font-medium">甲辰 · 龙年 · Dragon</p>
        </footer>

    </div>

</body>
</html>
</body>
