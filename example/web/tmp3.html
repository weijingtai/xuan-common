<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>经纬时分选择器 - 中国风版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --cinnabar: #B22D2A; /* 朱砂红 */
            --ink-black: #2D2D2D; /* 焦墨 */
            --ink-grey: #7A7A7A; /* 烟墨 */
            --paper: #F7F4EF; /* 宣纸色 */
        }
        body {
            font-family: 'Noto Serif SC', serif;
            background-color: #E8E4D9;
            color: var(--ink-black);
        }
        .paper-texture {
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            background-color: var(--paper);
        }
        .writing-v {
            writing-mode: vertical-lr;
            text-orientation: upright;
        }
        /* 模拟印章效果 */
        .seal-active {
            background-color: rgba(178, 45, 42, 0.1);
            border: 2px solid var(--cinnabar);
            color: var(--cinnabar);
            position: relative;
        }
        .seal-active::after {
            content: '印';
            position: absolute;
            bottom: -2px;
            right: -2px;
            font-size: 8px;
            background: var(--cinnabar);
            color: white;
            padding: 0 2px;
            opacity: 0.3;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-12">
        
        <section class="paper-texture shadow-xl border border-[#D1CDC2] rounded-sm overflow-hidden">
            <header class="p-4 border-b border-[#D1CDC2] flex justify-between items-center bg-[#F2EFE5]">
                <div>
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <span class="bg-[#B22D2A] text-white px-2 py-0.5 text-sm rounded-sm">刻</span>
                        2026-02-25 · 丙午年
                    </h2>
                    <p class="text-xs text-gray-500 mt-1">选择刻度（每刻 15 分钟）</p>
                </div>
                <button class="p-2 border border-gray-300 rounded-full hover:bg-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg>
                </button>
            </header>

            <div class="p-4 space-y-3">
                <div class="border border-[#D1CDC2]">
                    <div class="flex items-center justify-between p-3 bg-[#F2EFE5]/50 border-b border-[#D1CDC2]">
                        <span class="text-lg font-bold">子时 <small class="text-xs font-normal opacity-60">23:00 - 01:00</small></span>
                        <span class="text-xs text-[#B22D2A]">当前已选：三刻</span>
                    </div>
                    <div class="grid grid-cols-4 md:grid-cols-8 gap-2 p-3">
                        <button class="flex flex-col items-center p-2 border border-gray-200 hover:border-[#B22D2A] transition-all bg-white">
                            <span class="text-[10px] text-gray-400">初刻</span>
                            <span class="text-sm font-bold">00</span>
                        </button>
                        <button class="flex flex-col items-center p-2 border border-gray-200 hover:border-[#B22D2A] transition-all bg-white">
                            <span class="text-[10px] text-gray-400">一刻</span>
                            <span class="text-sm font-bold">15</span>
                        </button>
                        <button class="flex flex-col items-center p-2 border border-gray-200 hover:border-[#B22D2A] transition-all bg-white">
                            <span class="text-[10px] text-gray-400">二刻</span>
                            <span class="text-sm font-bold">30</span>
                        </button>
                        <button class="flex flex-col items-center p-2 seal-active bg-white">
                            <span class="text-[10px] opacity-70">三刻</span>
                            <span class="text-sm font-bold">45</span>
                        </button>
                        <button class="flex flex-col items-center p-2 border border-gray-200 opacity-50 bg-white">
                            <span class="text-[10px] text-gray-400">四刻</span>
                            <span class="text-sm font-bold">60</span>
                        </button>
                        <button class="flex flex-col items-center p-2 border border-gray-200 opacity-50 bg-white">
                            <span class="text-[10px] text-gray-400">五刻</span>
                            <span class="text-sm font-bold">75</span>
                        </button>
                        <button class="flex flex-col items-center p-2 border border-gray-200 opacity-50 bg-white">
                            <span class="text-[10px] text-gray-400">六刻</span>
                            <span class="text-sm font-bold">90</span>
                        </button>
                        <button class="flex flex-col items-center p-2 border border-gray-200 opacity-50 bg-white">
                            <span class="text-[10px] text-gray-400">七刻</span>
                            <span class="text-sm font-bold">105</span>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between p-3 border border-[#D1CDC2] hover:bg-white cursor-pointer transition-colors">
                    <span class="font-bold text-gray-600">丑时 <small class="text-xs font-normal opacity-40">01:00 - 03:00</small></span>
                    <svg class="w-4 h-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </div>
                <div class="flex items-center justify-between p-3 border border-[#D1CDC2] hover:bg-white cursor-pointer transition-colors opacity-60">
                    <span class="font-bold text-gray-600">寅时 <small class="text-xs font-normal opacity-40">03:00 - 05:00</small></span>
                    <svg class="w-4 h-4 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                </div>
            </div>
        </section>

        <section class="paper-texture shadow-xl border border-[#D1CDC2] rounded-sm overflow-hidden flex flex-col h-[500px]">
            <header class="p-4 border-b border-[#D1CDC2] flex justify-between items-center bg-[#F2EFE5]">
                <div>
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <span class="bg-gray-600 text-white px-2 py-0.5 text-sm rounded-sm">分</span>
                        时辰分钟精选
                    </h2>
                    <p class="text-xs text-gray-500 mt-1">选择分钟刻度（5 分钟步进）</p>
                </div>
            </header>

            <div class="flex flex-1 overflow-hidden">
                <aside class="w-16 border-r border-[#D1CDC2] bg-[#E8E4D9]/50 overflow-y-auto scrollbar-hide">
                    <div class="flex flex-col items-center py-4 space-y-4">
                        <button class="writing-v p-2 bg-[#B22D2A] text-white font-bold rounded-sm text-sm">子时</button>
                        <button class="writing-v p-2 text-gray-500 hover:text-black transition-colors text-sm">丑时</button>
                        <button class="writing-v p-2 text-gray-500 hover:text-black transition-colors text-sm">寅时</button>
                        <button class="writing-v p-2 text-gray-500 hover:text-black transition-colors text-sm">卯时</button>
                        <button class="writing-v p-2 text-gray-500 hover:text-black transition-colors text-sm">辰时</button>
                        <button class="writing-v p-2 text-gray-500 hover:text-black transition-colors text-sm">巳时</button>
                        <button class="writing-v p-2 text-gray-500 hover:text-black transition-colors text-sm">午时</button>
                    </div>
                </aside>

                <main class="flex-1 p-4 overflow-y-auto">
                    <div class="grid grid-cols-4 sm:grid-cols-6 gap-3">
                        <script>
                            for(let i=0; i<120; i+=5) {
                                let activeClass = i === 15 ? 'seal-active shadow-inner' : 'bg-white border-gray-200 text-gray-600';
                                document.write(`
                                    <button class="aspect-square flex flex-col items-center justify-center border transition-all hover:border-[#B22D2A] ${activeClass}">
                                        <span class="text-lg font-serif font-bold">${i}</span>
                                        <span class="text-[8px] opacity-40 -mt-1">min</span>
                                    </button>
                                `);
                            }
                        </script>
                    </div>
                </main>
            </div>
        </section>

    </div>

    <br />
    <div class="card">
  <div class="watermark">未</div>
  
  <div class="content-wrapper">
    <div class="main-pillar">辛<br/>未</div>
    
    <div class="details">
      <div class="stats-row">
        <div class="stat-item"><span class="god">食</span><span class="root">己</span></div>
        <div class="stat-item"><span class="god">枭</span><span class="root">丁</span></div>
        <div class="stat-item"><span class="god">杀</span><span class="root">乙</span></div>
      </div>
      <div class="badge-group">13 | 15</div>
    </div>
  </div>
</div>
</body>
</html>
