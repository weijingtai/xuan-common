<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中式命理卡片</title>
  <!-- 引入Tailwind CSS CDN，确保样式生效 -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div style="width: 120px;height: 120px;" class="relative bg-[#F9F6F0] p-2 border-[0.5px] border-[#D1CDC2] flex flex-col justify-between aspect-square min-w-[100px] hover:bg-[#F2EFE5] transition-colors group paper-texture">
  
  <div class="flex justify-between items-start leading-none">
    <span class="text-lg font-serif text-[#959595] opacity-50">15</span>
    <span class="text-[9px] text-[#B22D2A]/80 font-medium">立春</span>
  </div>

  <div class="flex justify-center items-center gap-1.5 -mt-1">
    <div class="writing-v text-base font-bold text-[#2D2D2D] leading-none tracking-tighter">
      甲子
    </div>
    <div class="text-[11px] font-bold text-[#B22D2A] self-start mt-0.5">
      偏<br/>财
    </div>
  </div>

  <div class="mt-1 border-t border-[#D1CDC2]/30 pt-1.5 flex justify-around items-end">
    <div class="flex flex-col items-center">
      <span class="text-[8px] text-[#A9A9A9] scale-90 mb-0.5">戊</span>
      <span class="text-[11px] font-bold text-[#B22D2A]">财</span>
    </div>
    <div class="flex flex-col items-center">
      <span class="text-[8px] text-[#A9A9A9] scale-90 mb-0.5">乙</span>
      <span class="text-[11px] font-bold text-[#B22D2A]">官</span>
    </div>
    <div class="flex flex-col items-center">
      <span class="text-[8px] text-[#A9A9A9] scale-90 mb-0.5">癸</span>
      <span class="text-[11px] font-bold text-[#B22D2A]">印</span>
    </div>
  </div>

  <div class="absolute bottom-1 left-1 w-1.5 h-1.5 bg-[#B22D2A] rounded-sm opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>

<br/>

<div class="relative bg-[#F9F6F0] p-1.5 border-[0.5px] border-[#D1CDC2] flex flex-col justify-between aspect-square min-w-[80px] hover:bg-[#F2EFE5] transition-colors group">
  
  <div class="flex justify-between items-start leading-none">
    <span class="text-sm font-serif text-[#959595] opacity-60">15</span>
    <span class="text-[9px] text-[#B22D2A] font-medium">立春</span>
  </div>

  <div class="relative flex justify-center items-center gap-1 -mt-1">
    <div class="writing-v text-sm font-bold text-[#2D2D2D] leading-none tracking-tighter">
      甲子
    </div>
    <div class="text-[10px] font-bold text-[#B22D2A] self-start mt-0.5 leading-none">
      偏<br/>财
    </div>
  </div>

  <div class="mt-1 border-t border-[#D1CDC2]/30 pt-1 flex justify-around items-end">
    <div class="flex flex-col items-center">
      <span class="text-[8px] text-[#A9A9A9] scale-90 leading-none mb-0.5">戊</span>
      <span class="text-[10px] font-bold text-[#B22D2A] leading-none">财</span>
    </div>
    <div class="flex flex-col items-center border-l border-[#D1CDC2]/20 pl-0.5">
      <span class="text-[8px] text-[#A9A9A9] scale-90 leading-none mb-0.5">乙</span>
      <span class="text-[10px] font-bold text-[#B22D2A] leading-none">官</span>
    </div>
    <div class="flex flex-col items-center border-l border-[#D1CDC2]/20 pl-0.5">
      <span class="text-[8px] text-[#A9A9A9] scale-90 leading-none mb-0.5">癸</span>
      <span class="text-[10px] font-bold text-[#B22D2A] leading-none">印</span>
    </div>
  </div>

  <div class="absolute bottom-0 right-0.5 text-[8px] text-[#A9A9A9] opacity-30">鼠</div>
</div>
</body>
</html>
