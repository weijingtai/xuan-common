<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简时令卡片</title>
    <style>
        :root {
            --text-main: #333333;
            --text-sub: #999999;
            --text-hint: #cccccc;
            /* Footer 使用更浅的颜色 */
            --accent-red: #c05b5b;
            --sun-bg: #fffcf0;
            --sun-border: #f9eebc;
            --moon-bg: #f5f9ff;
            --moon-border: #d6eaff;
            --card-bg: #ffffff;
        }

        body {
            background-color: #f2f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            width: 500px;
            /* 适当拉宽以适配单行排版 */
            border-radius: 28px;
            padding: 35px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            color: var(--text-main);
        }

        /* 第一行：公历与大时间 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
        }

        .date-gregorian {
            font-size: 28px;
            color: var(--text-sub);
            font-weight: 300;
        }

        .time-now {
            font-size: 32px;
            font-weight: 700;
            font-family: 'Helvetica Neue', Arial;
        }

        /* 第二行：农历干支 */
        .lunar-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .lunar-text {
            font-size: 30px;
            font-weight: 700;
        }

        .term-tag {
            color: var(--accent-red);
            font-size: 18px;
            font-weight: 600;
        }

        /* 日月部分：保持水平一行，内部也强行水平 */
        .astro-container {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .astro-box {
            flex: 1;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid transparent;
            display: flex;
            justify-content: space-between;
            /* 内部出/落左右排布 */
            align-items: center;
            font-size: 14px;
        }

        .sun-box {
            background: var(--sun-bg);
            border-color: var(--sun-border);
        }

        .moon-box {
            background: var(--moon-bg);
            border-color: var(--moon-border);
        }

        .astro-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .astro-item span:first-child {
            color: var(--text-sub);
        }

        .astro-item b {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* 进度条 */
        .progress-area {
            margin-bottom: 25px;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .bar-bg {
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
        }

        .bar-fill {
            height: 100%;
            background: var(--accent-red);
            width: 45%;
            border-radius: 2px;
        }

        /* 三候 */
        .pentads {
            text-align: center;
            font-size: 15px;
            color: var(--text-sub);
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        .active-pentad {
            color: var(--text-main);
            font-weight: 600;
            border-bottom: 2px solid var(--accent-red);
            padding-bottom: 2px;
        }

        /* Footer：弱化处理，中心竖排 */
        .footer {
            border-top: 1px solid #f5f5f5;
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .footer-city {
            font-size: 12px;
            color: var(--text-sub);
            letter-spacing: 1px;
        }

        .footer-coords {
            font-size: 11px;
            color: var(--text-hint);
            /* 使用最浅的颜色 */
            font-family: "Courier New", monospace;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="header">
            <div class="date-gregorian">1995年06月13日</div>
            <div class="time-now">01:30</div>
        </div>

        <div class="lunar-row">
            <div class="lunar-text">乙亥年 五月十六 丑时</div>
            <div class="term-tag">仲夏</div>
        </div>

        <div class="astro-container">
            <div class="astro-box sun-box">
                <div class="astro-item"><span>☼ 日出</span> <b>06:23</b></div>
                <div class="astro-item"><span>☀ 日落</span> <b>18:22</b></div>
            </div>
            <div class="astro-box moon-box">
                <div class="astro-item"><span>☾ 月出</span> <b>05:50</b></div>
                <div class="astro-item"><span>🌑 月落</span> <b>16:28</b></div>
            </div>
        </div>

        <div class="progress-area">
            <div class="progress-labels">
                <span style="color:var(--accent-red); font-weight:600;">芒种 06/06</span>
                <span style="color:var(--text-sub);">夏至 06/22</span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill"></div>
            </div>
        </div>

        <div class="pentads">
            螳螂生 · <span class="active-pentad">鵙始鸣</span> · 反舌无声
        </div>

        <div class="footer">
            <div class="footer-city">北京市 朝阳区</div>
            <div class="footer-coords">116°24'E · 39°54'N</div>
        </div>
    </div>

</body>

</html>
