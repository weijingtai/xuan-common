<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精炼时令天文卡片</title>
    <style>
        :root {
            --primary-black: #2d3436;
            --secondary-gray: #636e72;
            --accent-red: #d63031;
            --sun-accent: #f39c12;
            --moon-accent: #3498db;
            --bg-gray: #f7f9fb;
            --card-bg: #ffffff;
            --border-light: #edf2f7;
        }

        body {
            background-color: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            width: 460px;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.04);
            color: var(--primary-black);
        }

        /* 第一行：公历与时间 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .date-main {
            font-size: 24px;
            font-weight: 300;
            color: var(--secondary-gray);
            letter-spacing: -0.5px;
        }

        .time-now {
            font-size: 24px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        /* 第二行：农历干支 */
        .lunar-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .lunar-text {
            font-size: 26px;
            font-weight: 700;
        }

        .term-tag {
            color: var(--accent-red);
            font-weight: 600;
        }

        /* 日月升落样式修改（去色块，改为轻量化边框卡片） */
        .astro-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 25px;
        }

        .astro-card {
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .sun-style {
            background: linear-gradient(135deg, #fffcf5 0%, #fff 100%);
            border-color: #ffeaa7;
        }

        .moon-style {
            background: linear-gradient(135deg, #f5f9ff 0%, #fff 100%);
            border-color: #d6eaff;
        }

        .astro-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .astro-label {
            font-size: 13px;
            color: var(--secondary-gray);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .astro-time {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-black);
        }

        /* 进度条 */
        .progress-section {
            margin-bottom: 20px;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--secondary-gray);
        }

        .bar-bg {
            height: 4px;
            background: #eee;
            border-radius: 2px;
        }

        .bar-fill {
            height: 100%;
            background: var(--accent-red);
            width: 50%;
            border-radius: 2px;
        }

        /* 物候 */
        .pentads {
            text-align: center;
            color: var(--secondary-gray);
            font-size: 14px;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .active-pentad {
            color: var(--primary-black);
            font-weight: 600;
            border-bottom: 1px solid var(--accent-red);
        }

        /* 底部脚注（中心竖直排布，无标签） */
        .footer-info {
            border-top: 1px solid var(--border-light);
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: #b2bec3;
            font-size: 13px;
        }

        .location-main {
            color: var(--secondary-gray);
            font-weight: 500;
            letter-spacing: 1px;
        }

        .coord-detail {
            font-family: "Courier New", Courier, monospace;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="header">
            <div class="date-main">1995年06月13日</div>
            <div class="time-now">01:30</div>
        </div>

        <div class="lunar-row">
            <div class="lunar-text">乙亥年 五月十六 丑时</div>
            <div class="term-tag">仲夏</div>
        </div>

        <div class="astro-grid">
            <div class="astro-card sun-style">
                <div class="astro-item">
                    <span class="astro-label"><span style="color:#f39c12">☼</span> 日出</span>
                    <span class="astro-time">06:23</span>
                </div>
                <div class="astro-item">
                    <span class="astro-label"><span style="color:#e67e22">☀</span> 日落</span>
                    <span class="astro-time">18:22</span>
                </div>
            </div>
            <div class="astro-card moon-style">
                <div class="astro-item">
                    <span class="astro-label"><span style="color:#3498db">☾</span> 月出</span>
                    <span class="astro-time">05:50</span>
                </div>
                <div class="astro-item">
                    <span class="astro-label"><span style="color:#2980b9">🌑</span> 月落</span>
                    <span class="astro-time">16:28</span>
                </div>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-labels">
                <span style="color:var(--accent-red)">芒种 06/06</span>
                <span>夏至 06/22</span>
            </div>
            <div class="bar-bg">
                <div class="bar-fill"></div>
            </div>
        </div>

        <div class="pentads">
            螳螂生 · <span class="active-pentad">鵙始鸣</span> · 反舌无声
        </div>

        <div class="footer-info">
            <div class="location-main">北京市 朝阳区</div>
            <div class="coord-detail">116°24'E · 39°54'N</div>
        </div>
    </div>

</body>

</html>
