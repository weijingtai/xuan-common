<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紧凑型时令天文卡片</title>
    <style>
        :root {
            --text-main: #2d3436;
            --text-sub: #858e96;
            --text-disabled: #dcdde1;
            --accent-red: #c05b5b;
            --card-bg: #ffffff;
            --bg-page: #f1f3f5;
        }

        body {
            background-color: var(--bg-page);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: var(--card-bg);
            width: 380px;
            /* 进一步压缩宽度 */
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
            color: var(--text-main);
        }

        /* 头部：极其紧凑 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 4px;
        }

        .date-gregorian {
            font-size: 20px;
            color: var(--text-sub);
            font-weight: 300;
        }

        .time-now {
            font-size: 22px;
            font-weight: 700;
        }

        .lunar-row {
            margin-bottom: 20px;
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .term-tag {
            color: var(--accent-red);
            font-size: 14px;
            font-weight: 600;
        }

        /* 日月进度条区块 */
        .astro-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .astro-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 紧凑的时间点显示 */
        .time-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 45px;
        }

        .node-label {
            font-size: 10px;
            color: var(--text-sub);
            margin-bottom: 2px;
        }

        .node-val {
            font-size: 13px;
            font-weight: 600;
        }

        /* 进度条样式 */
        .progress-container {
            flex: 1;
            height: 4px;
            background: #eee;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
        }

        /* 状态控制 */
        .sun-active .progress-fill {
            background: #f39c12;
        }

        .moon-active .progress-fill {
            background: #3498db;
        }

        /* 不可用状态：进度条变灰，填充消失或变浅 */
        .is-unavailable {
            opacity: 0.4;
        }

        .is-unavailable .progress-fill {
            background: var(--text-disabled) !important;
        }

        /* 节气进度条（长条） */
        .term-progress {
            margin-bottom: 18px;
        }

        .term-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 6px;
            color: var(--text-sub);
        }

        .bar-mini {
            height: 3px;
            background: #f0f0f0;
            border-radius: 1.5px;
        }

        .bar-mini-fill {
            height: 100%;
            background: var(--accent-red);
            width: 45%;
        }

        /* 物候 */
        .pentads {
            text-align: center;
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 20px;
        }

        .active-p {
            color: var(--text-main);
            font-weight: 600;
            border-bottom: 1.5px solid var(--accent-red);
        }

        /* Footer: 中心竖直排布，无标签，颜色最淡 */
        .footer {
            border-top: 1px solid #f8f8f8;
            padding-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .f-city {
            font-size: 11px;
            color: var(--text-sub);
        }

        .f-coord {
            font-size: 10px;
            color: #d1d1d1;
            font-family: monospace;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="header">
            <div class="date-gregorian">1995年06月13日</div>
            <div class="time-now">01:30</div>
        </div>

        <div class="lunar-row">
            <span>乙亥年 五月十六 丑时</span>
            <span class="term-tag">仲夏</span>
        </div>

        <div class="astro-section">
            <div class="astro-row is-unavailable">
                <div class="time-node">
                    <span class="node-label">☼ 升</span>
                    <span class="node-val">06:23</span>
                </div>
                <div class="progress-container">
                    <div class="progress-fill" style="width: 0%;"></div>
                </div>
                <div class="time-node">
                    <span class="node-label">☼ 落</span>
                    <span class="node-val">18:22</span>
                </div>
            </div>

            <div class="astro-row is-unavailable">
                <div class="time-node">
                    <span class="node-label">☾ 升</span>
                    <span class="node-val">05:50</span>
                </div>
                <div class="progress-container">
                    <div class="progress-fill" style="width: 0%;"></div>
                </div>
                <div class="time-node">
                    <span class="node-label">☾ 落</span>
                    <span class="node-val">16:28</span>
                </div>
            </div>
        </div>

        <div class="term-progress">
            <div class="term-labels">
                <span style="color:var(--accent-red)">芒种 06/06</span>
                <span>夏至 06/22</span>
            </div>
            <div class="bar-mini">
                <div class="bar-mini-fill"></div>
            </div>
        </div>

        <div class="pentads">
            螳螂生 · <span class="active-p">鵙始鸣</span> · 反舌无声
        </div>

        <div class="footer">
            <div class="f-city">北京市 朝阳区</div>
            <div class="f-coord">116°24'E · 39°54'N</div>
        </div>
    </div>

</body>

</html>
