<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新中式胶囊 Widget</title>
    <style>
        :root {
            --wood-dark: #2a1b15;
            /* 檀木深 */
            --gold-leaf: #d4af37;
            /* 描金 */
            --paper-light: #fdfaf2;
            /* 绢丝白 */
            --vermilion: #a62c2b;
            /* 朱砂 */
            --ink-text: #333333;
            --capsule-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        body {
            background-color: #f0ede5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "STSong", "SimSun", serif;
        }

        /* --- 核心组件容器 --- */
        .capsule-widget {
            width: 340px;
            background: var(--paper-light);
            border-radius: 40px;
            /* 默认大圆角 */
            border: 2px solid var(--wood-dark);
            box-shadow: var(--capsule-shadow);
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        /* --- 收缩后的“胶囊”状态样式 --- */
        .capsule-widget.collapsed {
            width: 180px;
            /* 收缩变窄 */
            border-radius: 50px;
            background: var(--wood-dark);
        }

        /* --- 头部区域 --- */
        .widget-header {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            z-index: 10;
        }

        .title-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 装饰图标：小八卦 */
        .bagua-icon {
            width: 24px;
            height: 24px;
            background: var(--gold-leaf);
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--wood-dark);
            transition: transform 0.6s;
        }

        .capsule-widget.collapsed .bagua-icon {
            transform: rotate(180deg);
            background: var(--paper-light);
        }

        .title-text {
            font-weight: bold;
            color: var(--wood-dark);
            letter-spacing: 1px;
        }

        .capsule-widget.collapsed .title-text {
            color: var(--gold-leaf);
            font-size: 0.9rem;
        }

        /* 仅在收缩时显示的当前值 */
        .current-value {
            display: none;
            font-size: 0.8rem;
            color: var(--gold-leaf);
            opacity: 0.8;
        }

        .capsule-widget.collapsed .current-value {
            display: inline;
        }

        /* --- 展开后的内容区 --- */
        .widget-content {
            padding: 0 10px 20px 10px;
            max-height: 500px;
            opacity: 1;
            transition: all 0.4s ease;
        }

        .capsule-widget.collapsed .widget-content {
            max-height: 0;
            opacity: 0;
            padding: 0;
            pointer-events: none;
        }

        /* 选项样式：现代卡片化 */
        .option-card {
            background: white;
            margin: 8px;
            padding: 12px 15px;
            border-radius: 15px;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .option-card:hover {
            transform: translateX(5px);
            border-color: var(--gold-leaf);
        }

        /* 自定义选中态 */
        input[type="radio"] {
            display: none;
        }

        .check-mark {
            width: 16px;
            height: 16px;
            border: 2px solid #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        input[type="radio"]:checked+.option-card {
            background: #fffcf5;
            border: 1.5px solid var(--vermilion);
        }

        input[type="radio"]:checked+.option-card .check-mark {
            border-color: var(--vermilion);
            background: var(--vermilion);
        }

        input[type="radio"]:checked+.option-card .check-mark::after {
            content: "";
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
        }

        .label-group b {
            display: block;
            font-size: 0.95rem;
            color: var(--ink-text);
        }

        .label-group span {
            font-size: 0.75rem;
            color: #888;
        }

        /* 推荐小标签 */
        .tag-rec {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: var(--vermilion);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px 0 0 10px;
        }

        /* 底部操作 */
        .footer-action {
            text-align: center;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
            margin: 0 20px;
        }

        .btn-default {
            background: none;
            border: 1px solid var(--wood-dark);
            color: var(--wood-dark);
            border-radius: 20px;
            padding: 4px 15px;
            font-size: 0.8rem;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="capsule-widget" id="widget">
        <div class="widget-header" onclick="toggleWidget()">
            <div class="title-area">
                <div class="bagua-icon">☯</div>
                <span class="title-text">交節方案</span>
            </div>
            <span class="current-value">· 按分鐘</span>
        </div>

        <div class="widget-content">
            <label>
                <input type="radio" name="plan" value="時辰">
                <div class="option-card">
                    <div class="check-mark"></div>
                    <div class="label-group">
                        <b>依時辰交節</b>
                        <span>传统子午流注计时</span>
                    </div>
                </div>
            </label>

            <label>
                <input type="radio" name="plan" value="分鐘" checked>
                <div class="option-card">
                    <div class="check-mark"></div>
                    <div class="label-group">
                        <b>依分鐘交節</b>
                        <span>現代精密曆法演算</span>
                    </div>
                    <div class="tag-rec">首選</div>
                </div>
            </label>

            <label>
                <input type="radio" name="plan" value="秒時">
                <div class="option-card">
                    <div class="check-mark"></div>
                    <div class="label-group">
                        <b>依秒時交節</b>
                        <span>極致天文觀測精度</span>
                    </div>
                </div>
            </label>

            <div class="footer-action">
                <button class="btn-default">設為常用</button>
            </div>
        </div>
    </div>

    <script>
        function toggleWidget() {
            const widget = document.getElementById('widget');
            widget.classList.toggle('collapsed');
        }

        // 禁止点击内部选项时触发收缩
        document.querySelector('.widget-content').onclick = (e) => e.stopPropagation();
    </script>
</body>

</html>
